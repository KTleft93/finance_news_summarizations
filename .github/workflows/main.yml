name: Run Python App with Playwright Daily

on:
  # Triggers the workflow every day at 00:00 UTC (Adjust time as needed)
  schedule:
    - cron: '0 14 * * *'
  
  # Keeps the manual trigger button active so you can run it whenever you want
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ensure Playwright is installed
      run: pip install playwright

    - name: Install Playwright Browsers and Deps
      run: playwright install --with-deps

    - name: Run Application
      env:
        CONTENT_PROMPT: ${{ secrets.CONTENT_PROMPT }}
        DISCORD_URL: ${{ secrets.DISCORD_URL }}
        FINLIGHT_API: ${{ secrets.FINLIGHT_API }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MODEL_1: ${{ secrets.MODEL_1 }}
        MODEL_2: ${{ secrets.MODEL_2 }}
        RAW_TXT_PROMPT: ${{ secrets.RAW_TXT_PROMPT }}
        APP_ENV: "test"
        
      run: python app.py
