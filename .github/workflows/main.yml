name: Run Python App with Playwright Daily

on:
  schedule:
    - cron: '0 14 * * *' # Runs at 2:00 PM UTC
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest
    environment: production 

    defaults:
      run:
        working-directory: ./project

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
        cache-dependency-path: 'project/requirements.txt'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ensure Playwright is installed
      run: pip install playwright

    - name: Install Playwright Browsers and Deps
      run: playwright install --with-deps

    - name: Run Application
      env:
        CONTENT_PROMPT: ${{ secrets.CONTENT_PROMPT }}
        DISCORD_URL: ${{ secrets.DISCORD_URL }}
        FINLIGHT_API: ${{ secrets.FINLIGHT_API }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MODEL_1: ${{ secrets.MODEL_1 }}
        MODEL_2: ${{ secrets.MODEL_2 }}
        RAW_TXT_PROMPT: ${{ secrets.RAW_TXT_PROMPT }}
        APP_ENV: "production"
      run: python app.py  
